  # ── Jetson AGX/IGX Thor (arm64 Tegra/iGPU). UNVALIDATED. ─────────────────────
  # Uses the Jetson-specific vLLM image; the host's NVIDIA container runtime
  # injects the L4T/Tegra libs+devices (no manual hostPath mounts). A Thor cluster
  # also needs runtimeClassName nvidia on the GPU pod — this manifest has no
  # extraPodSpecs/runtimeClassName value path, so that lever lives in the
  # cluster-profile (default nvidia containerd runtime) or a manifest edit, not in
  # this preset. The floating jetson tag must be verified before use.
  - name: "AGX-THOR"
    displayName: "Jetson AGX Thor (arm64, iGPU) — nano-9b-v2-fp8 jetson image (unvalidated)"
    group: "VSS Platform"
    remove: []
    add: |
      manifests:
        llm-vllm:
          replicas: 1
          gpuCount: 1
          image: "ghcr.io/nvidia-ai-iot/vllm:latest-jetson-thor"
          hfModel: "nvidia/NVIDIA-Nemotron-Nano-9B-v2-FP8"
          tensorParallel: "1"
          gpuMemUtil: "0.25"
          mambaSsmCacheDtype: "float32"
          toolCallParser: "nemotron_json"
          extraArgs: []

  - name: "IGX-THOR"
    displayName: "IGX + Thor iGPU (arm64) — nano-9b-v2-fp8 jetson image (unvalidated)"
    group: "VSS Platform"

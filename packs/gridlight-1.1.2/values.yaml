            license: "Apache-2.0"
            sizeGb: 20
            huggingface: "Lightricks/LTX-Video-0.9.7-distilled"
          cogvideox-5b:
            name: "CogVideoX 5B"
            tier: "mid"
            license: "Apache-2.0"
            sizeGb: 22
            huggingface: "THUDM/CogVideoX-5b"
          wan-2.1:
            name: "Wan 2.1 T2V 14B"
            tier: "flagship"
            license: "Apache-2.0"
            sizeGb: 40
            huggingface: "Wan-AI/Wan2.1-T2V-14B-Diffusers"
          wan-2.2:
            name: "Wan 2.2 T2V A14B"
            tier: "flagship"
            license: "Apache-2.0"
            sizeGb: 55
            huggingface: "Wan-AI/Wan2.2-T2V-A14B-Diffusers"

    # ---------------------------------------------------------------------------
    # Data directory
    # ---------------------------------------------------------------------------
    # All services write to the same PVC mounted at dataDir.
    # Override with GRIDLIGHT_DATA_DIR to use a host-path or different mount.
    dataDir: "/gridlight-data"

    # Shared persistent volume claim for model files and data.
    pvc:
      enabled: true
      storageClassName: ""   # leave blank for cluster default
      size: "100Gi"
      accessMode: ReadWriteOnce

    # ---------------------------------------------------------------------------
    # Gateway
    # ---------------------------------------------------------------------------
    gateway:
      deploy: true
      image:
        repository: "{{ .Values.global.imageRegistry }}/gateway"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      replicas: 1
      port: 8080
      service:
        type: ClusterIP
        port: 8080
        # Idle timeout (seconds) for cloud load balancers. Image/video generation are
        # long synchronous requests; the default 60s cuts them off ("Load failed").
        # Applied to AWS ELBs via annotation; for other LBs set service.annotations.
        idleTimeoutSeconds: 600
        # Extra Service annotations (e.g. NLB selection, ACM cert, other LB tuning).
        annotations: {}
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "1Gi"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      # TFLOPs this deployment claims from the license pool (0 = use full license allowance).
      tflopRequested: 0
      # Stable license fingerprint. Leave blank to auto-derive a deterministic value from
      # the Helm release (recommended) — this keeps one license allocation across pod
      # restarts instead of registering phantom gateways. Set explicitly only to share a
      # gateway identity across separate installs/clusters.
      licenseFingerprint: ""
      # License server URL. Override for air-gapped installs pointing at an on-prem server.
      licenseServerUrl: "https://license.gridlight.ai"
      # Gateway mode: "" = full (Neo4j + Qdrant), "lite" = SQLite-only (no Neo4j entity resolution).
      mode: ""
      # Comma-separated list of allowed CORS origins for browser clients.
      # Leave blank to allow all origins (permissive — safe for VPN-only deployments).
      # Set when exposing the gateway via Ingress to restrict to known origins.
      # Example: "https://app.example.com,https://admin.example.com"
      corsOrigins: ""
      # Escape hatch for advanced gateway tuning. Any key/value pair here is
      # injected as an env var on the gateway container. Useful for:
      #   QUERY_EXPANSION_ENABLED: "false"   # disable LLM query expansion (reduces latency)
      #   RAG_INITIAL_CANDIDATES: "30"       # more candidates = better recall, more compute
      #   NEO4J_ENTITY_RESOLUTION_TIMEOUT_MS: "500"  # cap Neo4j latency impact
      #   LATENCY_LOG_BREAKDOWN: "true"      # per-component latency logging
      #   INTERACTIONS_ENABLED: "true"       # enable interaction logging for analytics
      #   RUST_LOG: "debug"                  # verbose logging for troubleshooting
      env: {}

    # ---------------------------------------------------------------------------
    # PostgreSQL (in-cluster)
    # ---------------------------------------------------------------------------
    # WARNING: Setting deploy: false disables the in-cluster PostgreSQL instance.
    # PostgreSQL stores all conversation history, uploaded document metadata,
    # and TFLOP allocation records. Without it, NO context is saved across
    # sessions and the gateway will fail to start. Only set to false if you are
    # providing an external PostgreSQL instance via gateway.env (DATABASE_URL).
    postgres:
      deploy: true
      image: "postgres:16-bookworm"
      port: 5432
      database: "gridlight"
      user: "gridlight"
      # Password comes from auth.postgresPassword via Secret
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "2Gi"
      storage:
        size: "20Gi"
        storageClassName: ""

    # ---------------------------------------------------------------------------
    # Qdrant (in-cluster)
    # ---------------------------------------------------------------------------
    # WARNING: Setting deploy: false disables vector search (QDRANT_ENABLED and
    # SEMANTIC_SEARCH_ENABLED are set to false automatically). RAG queries will
    # fall back to keyword search only — semantic similarity matching is lost,
    # which significantly reduces answer quality for long documents.
    qdrant:
      deploy: true
      image: "qdrant/qdrant:v1.10.0"
      grpcPort: 6334
      httpPort: 6333
      collection: "gridlight"
      resources:
        requests:
          cpu: "250m"
          memory: "1Gi"
        limits:
          cpu: "2"
          memory: "4Gi"
      storage:
        size: "20Gi"
        storageClassName: ""

    # ---------------------------------------------------------------------------
    # Neo4j (in-cluster)
    # ---------------------------------------------------------------------------
    # WARNING: Setting deploy: false disables the knowledge graph (NEO4J_ENABLED
    # is set to false automatically). Entity resolution, relationship-aware
    # retrieval, and graph-hop context expansion are all disabled — the gateway
    # falls back to GRIDLIGHT_MODE=lite (SQLite-only). Complex multi-hop queries
    # and document relationship graphs will not be available.
    neo4j:
      deploy: true
      image: "neo4j:5.18-community"
      boltPort: 7687
      httpPort: 7474
      user: "neo4j"
      # Password comes from auth.neo4jPassword via Secret
      jvm:
        heapInitial: "512m"
        heapMax: "1G"
        pagecache: "512m"
      resources:
        requests:
          cpu: "500m"
          memory: "2Gi"
        limits:
          cpu: "3"
          memory: "4Gi"
      storage:
        size: "10Gi"
        storageClassName: ""

    # ---------------------------------------------------------------------------
    # LLM Agent (Rust, port 8001)
    # ---------------------------------------------------------------------------
    llmAgent:
      deploy: true
      image:
        repository: "{{ .Values.global.imageRegistry }}/agent"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      port: 8001
      # Override the model path used by llama-server. Leave empty to auto-derive
      # from models.llm.catalog. Set this only when using a pre-staged model
      # outside the catalog (also set bootstrap.enabled=false in that case).
      modelPath: ""
      # CPU-only mode: set to "cpu" to bypass GPU detection
      # device: ""
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
        limits:
          cpu: "8"
          memory: "16Gi"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      env: {}

    # ---------------------------------------------------------------------------
    # Embed Agent (Rust, port 8002)
    # ---------------------------------------------------------------------------
    embedAgent:
      deploy: true
      image:
        repository: "{{ .Values.global.imageRegistry }}/agent"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      port: 8002
      # Path to the embedding .gguf model file inside the container.
      # Defaults to the bootstrap download destination.
      modelPath: "/gridlight-data/models/embeddings/nomic-embed-text-v1.5.Q4_0.gguf"
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "4"
          memory: "6Gi"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      env: {}

    # ---------------------------------------------------------------------------
    # STT Agent (Python / faster-whisper, port 8004)
    # ---------------------------------------------------------------------------
    sttAgent:
      deploy: true
      image:
        repository: "{{ .Values.global.imageRegistry }}/agent-stt"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      port: 8004
      # Whisper model size: tiny (39MB), base (74MB), small (244MB), medium (769MB), large-v3 (1.5GB)
      modelSize: "tiny"
      # Quantization: auto, float16, int8 (int8 recommended for CPU)
      computeType: "auto"
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "4"
          memory: "4Gi"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      env: {}

    # ---------------------------------------------------------------------------
    # Image Agent (Python / diffusers, port 8005)
    # ---------------------------------------------------------------------------
    imageAgent:
      deploy: true
      image:
        repository: "{{ .Values.global.imageRegistry }}/agent-image"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      port: 8005
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
        limits:
          cpu: "8"
          memory: "16Gi"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      env: {}

    # ---------------------------------------------------------------------------
    # Voice Agent (Python / Piper TTS, port 8006)
    # ---------------------------------------------------------------------------
    voiceAgent:
      deploy: true
      image:
        repository: "{{ .Values.global.imageRegistry }}/agent-voice"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      port: 8006
      defaultVoice: "en_US-amy-medium"
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "2Gi"
      nodeSelector: {}
      tolerations: []
      affinity: {}
      env: {}

    # ---------------------------------------------------------------------------
    # Video Agent (Python / diffusers, port 8007)
    # ---------------------------------------------------------------------------
    # OFF by default (needs its own GPU) but validated end-to-end. The default model
    # (models.video.preset) is wan-2.1 (14B, production quality).
    #
    # GPU SIZING — this is the important one:
    #   • wan-2.1 (14B, DEFAULT): best on a ~48GB GPU (L40S / A100). It also runs on a
    #     16–24GB GPU (A10G/4090) via CPU offload (offloadMode=model) — slower, and
    #     needs the larger host-memory limit below for the offloaded weights.
    #   • On smaller GPUs, set models.video.preset to "wan-2.1-1.3b" or "auto".
    # The image bundles the fast plain-GET model downloader (Xet repos otherwise stall).
    # The video agent is single-concurrency: it returns 429 while a generation is in
    # flight, and a client disconnect does NOT cancel the in-flight job. For concurrent
    # video, run multiple replicas. Object storage / async generation tracked in GRD-2354.
    videoAgent:
      deploy: false
      # Replicas >1 enable parallel generation (the agent is single-concurrency and
      # returns 429 while busy). Each replica needs its own model storage: set
      # pvc.enabled=false (emptyDir per pod — re-downloads the model) or use a
      # ReadWriteMany storage class. The default ReadWriteOnce PVC attaches to one pod.
      replicas: 1
      image:
        repository: "{{ .Values.global.imageRegistry }}/agent-video"
        tag: "{{ .Values.global.imageTag }}"
        pullPolicy: "{{ .Values.global.imagePullPolicy }}"
      port: 8007
      # CPU offload for large models: auto | none | model | sequential.
      # "model" keeps the 14B default within VRAM on 16–24GB GPUs; "none" is fastest
      # on a 48GB GPU that fits the whole pipeline.
      offloadMode: "model"
      resources:
        requests:
          cpu: "2"
          memory: "16Gi"
        limits:
          cpu: "8"
          # 56Gi headroom for CPU-offloaded 14B weights; lower to 24Gi if pinning a
          # small model (wan-2.1-1.3b) that stays resident on the GPU.
          memory: "56Gi"
          nvidia.com/gpu: "1"   # video generation requires a GPU
      nodeSelector: {}
      tolerations: []
      affinity: {}
      env: {}

    # ---------------------------------------------------------------------------
    # Ingress
    # ---------------------------------------------------------------------------
    ingress:
      enabled: false
      # ingressClassName: "nginx"
      host: ""
      # tls: []
      annotations: {}

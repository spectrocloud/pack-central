            mixtral-8x22b:
              name: "Mixtral 8x22B Instruct v0.1"
              tier: "large"
              license: "Apache-2.0"
              sizeGb: 67.8
              huggingface: "MaziyarPanahi/Mixtral-8x22B-Instruct-v0.1-GGUF"
              filename: "Mixtral-8x22B-Instruct-v0.1.Q3_K_M.gguf"
              url: "https://huggingface.co/MaziyarPanahi/Mixtral-8x22B-Instruct-v0.1-GGUF/resolve/main/Mixtral-8x22B-Instruct-v0.1.Q3_K_M.gguf"
            deepseek-r1:
              name: "DeepSeek R1 671B"
              tier: "flagship"
              license: "MIT"
              sizeGb: 161
              shards: 9
              subdir: "DeepSeek-R1-Q2_K"
              filenameBase: "DeepSeek-R1-Q2_K"
              filename: "DeepSeek-R1-Q2_K-00001-of-00009.gguf"

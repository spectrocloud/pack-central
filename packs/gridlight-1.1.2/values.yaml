      # Image generation models — downloaded by image-agent via HuggingFace Hub.
      # The selected preset's huggingface repo ID is passed as IMAGE_MODEL_ID env var.
      image:
        preset: "juggernautxl"  # juggernautxl (default) | cogview3-plus | auraflow | cogview4 (large GPU)
        catalog:
          juggernautxl:
            name: "JuggernautXL v9"
            tier: "balanced"
            license: "OpenRAIL-M"
            sizeGb: 7
            huggingface: "RunDiffusion/Juggernaut-XL-v9"
          cogview3-plus:
            name: "CogView3-Plus 3B"
            tier: "entry"
            license: "Apache-2.0"
            sizeGb: 26
            huggingface: "THUDM/CogView3-Plus-3B"
          auraflow:
            name: "AuraFlow v0.3"
            tier: "mid"
            license: "Apache-2.0"
            sizeGb: 16.5
            huggingface: "fal/AuraFlow-v0.3"
          cogview4:
            name: "CogView4 6B (large GPU — needs >24GB VRAM / large PVC)"
            tier: "large"
            license: "Apache-2.0"
            sizeGb: 31.1
            huggingface: "THUDM/CogView4-6B"
          # hidream-i1 intentionally omitted: the image agent does not yet support
          # HiDream-I1's multi-encoder setup (load_dit_pipeline rejects it), and at
          # 17B/~47GB it doesn't fit common GPUs. Re-add once the agent supports it.

      # Video generation models — downloaded by video-agent via HuggingFace Hub.
      # The preset key is passed to the agent as DEFAULT_VIDEO_MODEL.
      #
      # DEFAULT IS wan-2.1 (14B) — production-quality output. It needs a ~48GB GPU
      # (L40S / A100) to run at full speed; it also fits 16–24GB GPUs (A10G/4090) via
      # CPU offload, just slower. On smaller GPUs, switch preset to "wan-2.1-1.3b".
      # Set preset: "auto" to let the agent pick by detected VRAM.
      video:
        preset: "wan-2.1"  # wan-2.1(14B) | wan-2.1-1.3b | cogvideox-5b | ltx-video | auto
        # Default output quality/resolution when a request omits it (gateway reads this
        # as DEFAULT_VIDEO_QUALITY). Higher = sharper + slower + more VRAM. A per-request
        # "quality_preset" (or explicit width/height/fps/steps) always overrides.
        #   proxy(512x320) draft(640x480) preview(768x512) 720p(1280x720) 1080p 2k 4k
        defaultQuality: "draft"
        catalog:

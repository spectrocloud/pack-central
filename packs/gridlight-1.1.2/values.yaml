# GRIDLIGHT Helm Chart — Default Values
# All values can be overridden at install time via --set or --values.
# Required fields (no default): auth.postgresPassword, auth.neo4jPassword.

# ---------------------------------------------------------------------------
# Pack metadata — consumed by Spectrocloud Palette, not by the Helm chart itself.
# Images here must be publicly pullable (pack-central crane pull CI check).
# Points to AWS Public ECR; production deployments use global.imageRegistry below.
# ---------------------------------------------------------------------------
pack:
  namespace: "gridlight"
  content:
    images:
      - image: "public.ecr.aws/q1c5c5i2/gridlight/gateway:1.1.2"
      - image: "public.ecr.aws/q1c5c5i2/gridlight/agent:1.1.2"
      - image: "public.ecr.aws/q1c5c5i2/gridlight/agent-stt:1.1.2"
      - image: "public.ecr.aws/q1c5c5i2/gridlight/agent-image:1.1.2"
      - image: "public.ecr.aws/q1c5c5i2/gridlight/agent-voice:1.1.2"
      - image: "public.ecr.aws/q1c5c5i2/gridlight/agent-video:1.1.2"

# ---------------------------------------------------------------------------
# Chart values — passed to the gridlight-palette Helm chart by Palette.
# ---------------------------------------------------------------------------
charts:
  gridlight-palette:

    # ---------------------------------------------------------------------------
    # Global
    # ---------------------------------------------------------------------------
    global:
      imageRegistry: "public.ecr.aws/q1c5c5i2/gridlight"
      imageTag: "1.1.2"
      imagePullPolicy: IfNotPresent
      imagePullSecrets: []

    # ---------------------------------------------------------------------------
    # Authentication & Secrets
    # ---------------------------------------------------------------------------
    auth:
      # REQUIRED — no default. Provide via --set or a sealed secret.
      postgresPassword: ""
      neo4jPassword: ""
      # Gateway API token — all client requests must include:
      #   Authorization: Bearer <gatewayToken>
      # IMPORTANT: change this from the default before deploying to production.
      gatewayToken: "dev-token"
      # Shared token used by Python agents to register with the gateway.
      # IMPORTANT: change this from the default before deploying to production.
      agentToken: "dev-token"
      # Gridlight license ID — required. Obtain from https://license.gridlight.ai
      licenseId: ""
      # Signing secret — leave blank. The gateway acquires this automatically from
      # the license server at first startup using the license ID above. Only set
      # this if migrating a deployment that already has a signing secret.
      signingSecret: ""
      # HuggingFace token — required only if image/video agents need to download gated models.
      # Create a read token at https://huggingface.co/settings/tokens
      huggingFaceToken: ""
      # ECR pull credentials. When set, the chart creates a regcred imagePullSecret.
      # Supply the base64-encoded Docker config JSON for your ECR token:
      #   aws ecr get-login-password | base64
      # Leave blank — public ECR images require no pull credentials.
      registryCredentials: ""

    # ---------------------------------------------------------------------------
    # Model bootstrap (automatic download on first install)
    # ---------------------------------------------------------------------------
    # When enabled, an init container downloads models before agents start.
    # Skipped if the file already exists (safe to re-run on upgrade).
    # Disable for air-gapped environments — pre-stage models on the PVC manually.
    bootstrap:
      enabled: true
      # Embedding model — fixed, not user-selectable (nomic-embed-text v1.5 Q4_0, ~274 MB)
      embedModelUrl: "https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/resolve/main/nomic-embed-text-v1.5.Q4_0.gguf"
      # LLM model URL is derived automatically from models.llm catalog — no longer set here.

    # ---------------------------------------------------------------------------
    # Model Catalog
    # ---------------------------------------------------------------------------
    # models.llm.category — "general" or "coding"
    # models.llm.preset   — key from catalog.<category> (see list below)
    # models.image.preset — key from catalog (image agent reads IMAGE_MODEL_ID env var)
    # models.video.preset — key from catalog (video agent reads DEFAULT_VIDEO_MODEL env var)
    #
    # To use a model not in the catalog, leave preset blank and set
    # llmAgent.modelPath to the full path of a pre-staged GGUF file.
    #
    # All catalog entries use Apache 2.0 or MIT licenses only.
    # ---------------------------------------------------------------------------
    models:
      llm:
        category: "general"  # general | coding
        preset: "qwen-7b"    # see catalog keys below
        catalog:
          general:
            mistral-7b:
              name: "Mistral 7B Instruct v0.3"
              tier: "entry"
              license: "Apache-2.0"
              sizeGb: 4.4
              huggingface: "bartowski/Mistral-7B-Instruct-v0.3-GGUF"
              filename: "Mistral-7B-Instruct-v0.3-Q4_K_M.gguf"
              url: "https://huggingface.co/bartowski/Mistral-7B-Instruct-v0.3-GGUF/resolve/main/Mistral-7B-Instruct-v0.3-Q4_K_M.gguf"
            qwen-7b:
              name: "Qwen 2.5 7B Instruct"
              tier: "entry"
              license: "Apache-2.0"
              sizeGb: 4.7

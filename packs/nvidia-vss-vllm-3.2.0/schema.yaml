# Pack value constraints for the VSS 3.1.0 standalone vLLM LLM backend.
# Keys are full dotted paths into values.yaml (the * sub-tree).
image:
  schema: '{{ required | format "${string}" | hints "vLLM container image (nvcr.io/nvidia/vllm:* on x86/SBSA; ghcr.io/nvidia-ai-iot/vllm:*-jetson-thor on Tegra)." }}'
hfModel:
  schema: '{{ required | format "${string}" | hints "HF model id vLLM loads (default nvidia/NVIDIA-Nemotron-Nano-9B-v2-FP8)." }}'
gpuMemUtil:
  schema: '{{ format "${number}" | hints "vLLM --gpu-memory-utilization (LLM share of the GPU pool, e.g. 0.5 on GB10)." }}'
tensorParallel:
  schema: '{{ format "${number}" | hints "vLLM --tensor-parallel-size (number of GPUs to shard across; 1 on single-GPU)." }}'
mambaSsmCacheDtype:
  schema: '{{ format "${string}" | hints "vLLM --mamba_ssm_cache_dtype for the nemotron mamba layers (e.g. auto)." }}'
toolCallParser:
  schema: '{{ format "${string}" | hints "vLLM --tool-call-parser (e.g. nemotron)." }}'
replicas:
  schema: '{{ format "${number}" | hints "vLLM Deployment replicas (1)." }}'
cacheSize:
  schema: '{{ format "${string}" | hints "PVC size for the model/HF cache (e.g. 80Gi)." }}'
gpuCount:
  schema: '{{ format "${number}" | hints "GPUs requested by the vLLM pod (nvidia.com/gpu limit; 1 on single-GPU)." }}'

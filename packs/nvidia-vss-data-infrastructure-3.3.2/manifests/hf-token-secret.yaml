# Shared HuggingFace token secret. Lives in the data-infrastructure pack because
# that layer (install-priority 5) is present in EVERY VSS profile and installs
# first -- so the secret exists before the model backends (vllm/nim) and the
# vss-agent (application) consume it. HF_TOKEN is a masked cluster-profile
# variable; required for the gated Cosmos-Reason2-8B VLM weights (and any gated
# LLM weights). The HF_TOKEN cluster variable is resolved in values.yaml as
# .Values.hfToken -- a spectro-var macro does NOT resolve inside a kubeManifest
# body ("map has no entry for spectro"), and Palette templates comments too, so
# it must be routed through .Values (never write macro braces in a manifest).
apiVersion: v1
kind: Secret
metadata:
  name: hf-token-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  HF_TOKEN: "{{ .Values.hfToken }}"
  HUGGING_FACE_HUB_TOKEN: "{{ .Values.hfToken }}"

# phoenix -- Arize Phoenix tracing/observability UI. IN BASE (bp_developer_base_2d).
# Compose: image arizephoenix/phoenix:version-8.12.1, ports 6006:6006 (bridge, not
# host-net), env PHOENIX_WORKING_DIR=/.phoenix/, named volume phoenix-data:/.phoenix.
# No GPU. vss-agent references it as PHOENIX_ENDPOINT=http://phoenix:6006.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: phoenix
  namespace: {{ .Values.namespace }}
  labels:
    app: phoenix
spec:
  serviceName: phoenix
  replicas: 1
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      # Public zero-CVE Chainguard wolfi-base; the pack provisions phoenix at startup
      # (apk add python+pip, then pip install) rather than shipping a hosted image.
      # python:latest-dev carries a fresh Critical (CVE-2026-7210) in its dev toolchain,
      # so we use wolfi-base (0/0) + the runtime apk python/pip — same pattern as ES's JRE.
      # The SCANNED image is the public Chainguard base = 0 CVE; python/phoenix are runtime.
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: phoenix
          image: {{ .Values.phoenix.image }}
          command:
            - sh
            - -c
            - |
              apk add --no-cache python-3.12 py3.12-pip
              python3.12 -m venv /tmp/venv
              /tmp/venv/bin/pip install --no-cache-dir {{ .Values.phoenix.pipSpec }}
              exec /tmp/venv/bin/phoenix serve
          ports:
            - name: http
              containerPort: 6006
          env:
            - name: PHOENIX_PORT
              value: "6006"
            - name: PHOENIX_WORKING_DIR
              value: "/.phoenix/"
          volumeMounts:
            - name: phoenix-data
              mountPath: /.phoenix
            - name: venv
              mountPath: /tmp
      volumes:
        - name: venv
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: phoenix-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.phoenix.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: {{ .Values.namespace }}
  labels:
    app: phoenix
spec:
  type: ClusterIP
  selector:
    app: phoenix
  ports:
    - name: http
      port: 6006
      targetPort: 6006

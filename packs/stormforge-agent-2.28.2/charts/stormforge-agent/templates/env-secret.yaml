{{- $values := dict
  "STORMFORGE_CLUSTER_NAME" (required "Chart value `clusterName` is required!" (include "stormforge-agent.clusterName" .))
-}}

{{- if .Values.proxyUrl -}}
  {{- $_ := set $values "HTTP_PROXY" .Values.proxyUrl -}}
  {{- $_ := set $values "HTTPS_PROXY" .Values.proxyUrl -}}
{{- end -}}
{{- if .Values.noProxy -}}
  {{- $_ := set $values "NO_PROXY" .Values.noProxy -}}
{{- end -}}

{{- range .Values.extraEnvVars -}}{{- $_ := set $values .name .value -}}{{- end -}}

{{- range $k, $v := $values -}}{{- $_ := set $values $k ($v | b64enc) -}}{{- end -}}
---
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "stormforge-agent.envSecret" . | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "stormforge-agent.labels" . | nindent 4 }}
data:
  {{- $values | toYaml | nindent 2 }}

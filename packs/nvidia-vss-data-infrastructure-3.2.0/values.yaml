# NVIDIA VSS 3.x — shared data infrastructure (manifest-only pack, platform-invariant).
#
# ┌─ VSS 3.x PLATFORM MATRIX (canonical — keep identical across all VSS 3.x packs) ─
# │ Set ONE profile variable VSS_PLATFORM and select the matching "VSS Platform"
# │ preset in every VSS 3.x pack. In 3.x ALL FIVE packs are in every profile
# │ (data-infrastructure + nims + vllm + core + ingress) — the vLLM pack is the LLM
# │ for all platforms (no NIM-LLM in 3.x), so there is no include/omit hazard.
# │ 3.x decode is NATIVE (VIOS/rt-cv); there is NO --disable-decoding.
# │
# │ Platform          LLM (vLLM model)        VLM            decode   vss-core tags
# │ DGX-SPARK         nemotron-nano-9b-v2-fp8 cosmos NIM     dGPU     3.1.0-sbsa
# │ OTHER             nemotron-nano-9b-v2-fp8 cosmos NIM     dGPU     3.1.0
# │ H100              nemotron-nano-9b-v2-fp8 cosmos NIM     dGPU     3.1.0 (x86)
# │ L40S              nemotron-nano-9b-v2-fp8 cosmos NIM     dGPU     3.1.0 (x86)
# │ RTXPRO6000BW      nemotron-nano-9b-v2-fp8 cosmos NIM     dGPU     3.1.0 (x86)
# │ AGX-THOR/IGX-THOR nano-9b-fp8 (jetson img) rt-vlm        Tegra*   3.1.0 + runtimeClassName
# │ * Tegra: runtimeClassName nvidia via extraPodSpecs; NVIDIA container runtime injects L4T.
# │ Only DGX-SPARK is the migration target; all rows UNVALIDATED (no hardware, unverified tags).
# └──────────────────────────────────────────────────────────────────────────────
#
# This pack is PLATFORM-INVARIANT: every image below is a standard public image, so
# there is NO "VSS Platform" preset group here (and no enabled-presets header). It
# owns two cross-pack objects — hf-token-secret (HF_TOKEN masked profile var, gated
# Cosmos/LLM weights) and the P5 vss-platform ConfigMap (VSS_PLATFORM source of
# truth) — plus the data stores. install-priority 5 → installs first in every
# profile so these exist before nims/vllm/core/ingress.
#
# BASE vs SEARCH/ALERTS: only phoenix + redis + postgres run in the base profile
# (bp_developer_base_2d). elasticsearch / kafka / kibana / logstash are authored for
# completeness so the search/alerts profiles can enable them.

pack:
  namespace: nvidia-vss
  spectrocloud.com/install-priority: "5"
  content:
    images:
      # IN BASE
      - image: redis:8.2.2-alpine
      - image: postgres:17.6-alpine
      - image: arizephoenix/phoenix:version-8.12.1
      # SEARCH/ALERTS profiles only
      - image: confluentinc/cp-kafka:8.1.1
      - image: docker.elastic.co/kibana/kibana:9.3.0
      - image: docker.elastic.co/logstash/logstash:9.3.0
      # elasticsearch is a BUILT image (Dockerfiles/elasticsearch.Dockerfile, ELK 9.x)
      # with no public published tag — fully parameterized; set before enabling search.
      # - image: <org-registry>/mdx-elasticsearch:9.x

# namespace macro consumed by every manifest's metadata.namespace.
namespace: nvidia-vss


# ── data stores (each key maps to .Values.<svc>.* in manifests/<svc>.yaml) ──────

# redis -- mdx-redis. IN BASE. redis-server /config/redis.conf.
redis:
  image: "redis:8.2.2-alpine"
  dataStorageSize: "10Gi"
  logStorageSize: "2Gi"
  # TODO(populate): the redis-config ConfigMap (mounted at /config, key redis.conf)
  # is NOT inlined here — carry deployments/foundational/redis/configs/redis.conf
  # verbatim into a redis-config ConfigMap before deploy. The StatefulSet will not
  # start without it.

# postgres -- centralizedb-dev (VST metadata DB). IN BASE. Service "postgres":5432.
postgres:
  image: "postgres:17.6-alpine"
  dataStorageSize: "20Gi"
  # TODO(populate): the postgres-config ConfigMap (mounted at /etc/postgresql, key
  # postgresql.conf) is NOT inlined here. Carry
  # deployments/vst/developer/vst/configs/postgresql.conf verbatim EXCEPT set
  # listen_addresses = '*' (shipped value is '' = unix-socket only, which leaves the
  # ClusterIP Service with no TCP listener). The StatefulSet will not start without it.

# phoenix -- Arize Phoenix tracing UI. IN BASE. vss-agent uses PHOENIX_ENDPOINT=http://phoenix:6006.
phoenix:
  image: "arizephoenix/phoenix:version-8.12.1"
  storageSize: "5Gi"

# elasticsearch -- mdx-elastic. SEARCH/ALERTS only. ClusterIP 9200.
elasticsearch:
  # TODO(verify): BUILT image, no registry tag in compose — point this at wherever
  # the org publishes the built ELK 9.x image before enabling search/alerts.
  image: "docker.elastic.co/elasticsearch/elasticsearch:9.3.0"
  dataStorageSize: "30Gi"
  logStorageSize: "5Gi"
  # TODO(populate): the elasticsearch-config ConfigMap (mounted at
  # /usr/share/elasticsearch/config/elasticsearch.yml, key elasticsearch.yml) is NOT
  # inlined here — populate from the repo's elasticsearch.yml when authoring search.
  # NOTE: the elasticsearch-init Job (ILM/template/ingest, also a BUILT image) is
  # omitted from this pack pending its published image.

# kafka -- mdx-kafka (KRaft single-node). SEARCH/ALERTS only. ClusterIP 9092/9093.
kafka:
  image: "confluentinc/cp-kafka:8.1.1"
  dataStorageSize: "20Gi"
  # TODO(populate): the kafka-entrypoint ConfigMap (mounted at /usr/local/bin,
  # key kafka-entrypoint.sh, mode 0755) is NOT inlined here — carry the repo's
  # kafka-entrypoint.sh verbatim before enabling search/alerts.
  # TODO(verify): KAFKA_ADVERTISED_LISTENERS uses Service DNS "kafka" (was $HOST_IP
  # in host-net compose); confirm against the cluster's service FQDN.
  # NOTE: the kafka-topic-init Job (~19 mdx-* topics) is omitted; add when authoring search.

# kibana -- mdx-kibana. SEARCH/ALERTS only. ClusterIP 5601.
kibana:
  image: "docker.elastic.co/kibana/kibana:9.3.0"
  publicBaseUrl: "http://localhost:5601"
  # TODO(populate): the kibana-config ConfigMap (mounted at
  # /usr/share/kibana/config/kibana.yml, key kibana.yml) is NOT inlined here. Populate
  # from the repo's kibana.yml, but point elasticsearch.hosts at the Service
  # ("http://elasticsearch:9200", not localhost) before enabling search/alerts.

# logstash -- mdx-logstash (egress pipeline; no Service). SEARCH/ALERTS only.
logstash:
  image: "docker.elastic.co/logstash/logstash:9.3.0"
  # STREAM_TYPE: "kafka" in the 3.x base search pipeline ("redis" needs the redis gem).
  streamType: "kafka"
  # TODO(populate): three ConfigMaps are referenced but NOT inlined here — populate
  # from deployments/foundational/elk/ when authoring the search pack:
  #   - logstash-config           (key logstash.yml)
  #   - logstash-pipeline         (key logstash.conf — the mdx-<streamType>-logstash.conf)
  #   - logstash-pb-definitions   (ext_pb.rb / schema_pb.rb / ext.desc / schema.desc;
  #                                the .desc files are binary protobuf descriptors)

# kubeManifest values: Palette templates each kubeManifest with .Values = the
# manifests.<basename> subtree, and resolves spectro-var macros HERE (values.yaml
# is macro-processed; raw manifest bodies are not). hf-token-secret.yaml/vss-platform.yaml
# reference {{ .Values.hfToken }} / {{ .Values.vssPlatform }} / {{ .Values.namespace }}.
manifests:
  hf-token-secret:
    namespace: nvidia-vss
    hfToken: "{{.spectro.var.HF_TOKEN}}"
  vss-platform:
    namespace: nvidia-vss
    vssPlatform: "{{.spectro.var.VSS_PLATFORM}}"

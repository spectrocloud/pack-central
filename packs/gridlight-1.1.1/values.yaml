# ---------------------------------------------------------------------------
# Data directory
# ---------------------------------------------------------------------------
# All services write to the same PVC mounted at dataDir.
# Override with GRIDLIGHT_DATA_DIR to use a host-path or different mount.
dataDir: "/gridlight-data"

# Shared persistent volume claim for model files and data.
pvc:
  enabled: true
  storageClassName: ""   # leave blank for cluster default
  size: "100Gi"
  accessMode: ReadWriteOnce

# ---------------------------------------------------------------------------
# Gateway
# ---------------------------------------------------------------------------
gateway:
  deploy: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/gateway"
    tag: "{{ .Values.global.imageTag }}"
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  replicas: 1
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Additional env vars passed to the gateway container
  env: {}

# ---------------------------------------------------------------------------
# PostgreSQL (in-cluster)
# ---------------------------------------------------------------------------
postgres:
  deploy: true
  image: "postgres:16-bookworm"
  port: 5432
  database: "gridlight"
  user: "gridlight"
  # Password comes from auth.postgresPassword via Secret
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  storage:
    size: "20Gi"
    storageClassName: ""

# ---------------------------------------------------------------------------
# Qdrant (in-cluster)
# ---------------------------------------------------------------------------
qdrant:
  deploy: true
  image: "qdrant/qdrant:v1.10.0"
  grpcPort: 6334
  httpPort: 6333
  collection: "gridlight"
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  storage:
    size: "20Gi"
    storageClassName: ""

# ---------------------------------------------------------------------------
# Neo4j (in-cluster)
# ---------------------------------------------------------------------------
neo4j:
  deploy: true
  image: "neo4j:5.18-community"
  boltPort: 7687
  httpPort: 7474
  user: "neo4j"
  # Password comes from auth.neo4jPassword via Secret
  jvm:
    heapInitial: "512m"
    heapMax: "1G"
    pagecache: "512m"
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "3"
      memory: "4Gi"
  storage:
    size: "10Gi"
    storageClassName: ""

# ---------------------------------------------------------------------------
# LLM Agent (Rust, port 8001)
# ---------------------------------------------------------------------------
llmAgent:
  deploy: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/agent"
    tag: "{{ .Values.global.imageTag }}"
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  port: 8001
  # Override the model path used by llama-server. Leave empty to auto-derive
  # from models.llm.catalog. Set this only when using a pre-staged model
  # outside the catalog (also set bootstrap.enabled=false in that case).
  modelPath: ""
  # CPU-only mode: set to "cpu" to bypass GPU detection
  # device: ""
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "16Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}

# ---------------------------------------------------------------------------
# Embed Agent (Rust, port 8002)
# ---------------------------------------------------------------------------
embedAgent:
  deploy: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/agent"
    tag: "{{ .Values.global.imageTag }}"
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  port: 8002
  # Path to the embedding .gguf model file inside the container.
  # Defaults to the bootstrap download destination.
  modelPath: "/gridlight-data/models/embeddings/nomic-embed-text-v1.5.Q4_0.gguf"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "6Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}

# ---------------------------------------------------------------------------
# STT Agent (Python / faster-whisper, port 8004)
# ---------------------------------------------------------------------------
sttAgent:
  deploy: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/agent-stt"
    tag: "{{ .Values.global.imageTag }}"
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  port: 8004
  # Whisper model size: tiny (39MB), base (74MB), small (244MB), medium (769MB), large-v3 (1.5GB)
  modelSize: "tiny"
  # Quantization: auto, float16, int8 (int8 recommended for CPU)
  computeType: "auto"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "4"
      memory: "4Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}

# ---------------------------------------------------------------------------
# Image Agent (Python / diffusers, port 8005)
# ---------------------------------------------------------------------------
imageAgent:
  deploy: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/agent-image"
    tag: "{{ .Values.global.imageTag }}"
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  port: 8005
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "16Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}

# ---------------------------------------------------------------------------
# Voice Agent (Python / Piper TTS, port 8006)
# ---------------------------------------------------------------------------
voiceAgent:
  deploy: true
  image:
    repository: "{{ .Values.global.imageRegistry }}/agent-voice"
    tag: "{{ .Values.global.imageTag }}"
    pullPolicy: "{{ .Values.global.imagePullPolicy }}"
  port: 8006
  defaultVoice: "en_US-amy-medium"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  # ingressClassName: "nginx"
  host: ""
  # tls: []
  annotations: {}

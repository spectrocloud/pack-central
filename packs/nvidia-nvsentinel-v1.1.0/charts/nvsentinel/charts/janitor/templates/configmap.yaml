apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "janitor.fullname" . }}
  labels:
    {{- include "janitor.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  config.yaml: |
    global:
      timeout: {{ .Values.config.timeout | default "25m" }}
      manualMode: {{ .Values.config.manualMode | default false }}
      {{- if .Values.config.nodes.exclusions }}
      nodes:
        exclusions:
        {{- range .Values.config.nodes.exclusions }}
          - {{- if .matchLabels }}
            matchLabels:
            {{- range $key, $value := .matchLabels }}
              {{ $key }}: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if .matchExpressions }}
            matchExpressions:
            {{- range .matchExpressions }}
              - key: {{ .key }}
                operator: {{ .operator }}
                {{- if .values }}
                values:
                {{- range .values }}
                  - {{ . | quote }}
                {{- end }}
                {{- end }}
            {{- end }}
            {{- end }}
        {{- end }}
      {{- end }}
      cspProviderHost: {{ .Values.config.cspProviderHost }}
      {{- if and .Values.config.cspProvider .Values.config.cspProvider.tls .Values.config.cspProvider.tls.enabled }}
      cspProviderCAPath: /etc/nvsentinel/janitor/csp-ca/ca.crt
      {{- end }}
      {{- if and .Values.config.cspProvider .Values.config.cspProvider.tls .Values.config.cspProvider.tls.insecure }}
      cspProviderInsecure: true
      {{- end }}
      {{- if and .Values.config.cspProvider .Values.config.cspProvider.auth .Values.config.cspProvider.auth.enabled }}
      cspProviderTokenPath: /var/run/secrets/nvsentinel/csp-provider/token
      {{- end }}

    rebootNodeController:
      enabled: {{ if (hasKey .Values.config.controllers.rebootNode "enabled") }}{{ .Values.config.controllers.rebootNode.enabled }}{{ else }}true{{ end }}
      timeout: {{ .Values.config.controllers.rebootNode.timeout | default .Values.config.timeout | default "25m" }}
      manualMode: {{ .Values.config.manualMode | default false }}
      {{- if .Values.config.controllers.rebootNode.cspProviderHost }}
      cspProviderHost: {{ .Values.config.controllers.rebootNode.cspProviderHost }}
      {{- end }}

    terminateNodeController:
      enabled: {{ if (hasKey .Values.config.controllers.terminateNode "enabled") }}{{ .Values.config.controllers.terminateNode.enabled }}{{ else }}true{{ end }}
      timeout: {{ .Values.config.controllers.terminateNode.timeout | default .Values.config.timeout | default "25m" }}
      manualMode: {{ .Values.config.manualMode | default false }}
      {{- if .Values.config.controllers.terminateNode.cspProviderHost }}
      cspProviderHost: {{ .Values.config.controllers.terminateNode.cspProviderHost }}
      {{- end }}

    gpuResetController:
      enabled: {{ if (hasKey .Values.config.controllers.gpuReset "enabled") }}{{ .Values.config.controllers.gpuReset.enabled }}{{ else }}true{{ end }}
      timeout: {{ .Values.config.controllers.gpuReset.timeout | default .Values.config.timeout | default "25m" }}
      manualMode: {{ .Values.config.manualMode | default false }}
      {{- if .Values.config.controllers.gpuReset.cspProviderHost }}
      cspProviderHost: {{ .Values.config.controllers.gpuReset.cspProviderHost }}
      {{- end }}
      {{- if .Values.config.controllers.gpuReset.resetJob }}
      resetJob:
        runtimeClassName: "{{ .Values.config.controllers.gpuReset.resetJob.runtimeClassName }}"
        imageConfig:
          image: "{{ .Values.config.controllers.gpuReset.resetJob.image.repository }}:{{ .Values.config.controllers.gpuReset.resetJob.image.tag | default ((.Values.global).image).tag | default .Chart.AppVersion }}"
          {{- with (.Values.config.controllers.gpuReset.resetJob.image.imagePullSecrets | default  (.Values.global).imagePullSecrets) }}
          imagePullSecrets:
            {{- toYaml . | nindent 10 }}
          {{- end }}
        resources:
          {{- toYaml .Values.config.controllers.gpuReset.resetJob.resources | nindent 10 }}
      {{- end }}
      {{- if .Values.config.controllers.gpuReset.serviceManager }}
      serviceManager:
        {{- toYaml .Values.config.controllers.gpuReset.serviceManager | nindent 8 }}
      {{- end }}

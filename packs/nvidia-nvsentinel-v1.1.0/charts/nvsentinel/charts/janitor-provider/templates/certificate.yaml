{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "provider.fullname" . }}-grpc-cert
  labels:
    {{- include "provider.labels" . | nindent 4 }}
spec:
  secretName: {{ include "provider.fullname" . }}-grpc-cert
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
  subject:
    organizations:
      - NVIDIA
  commonName: {{ include "provider.fullname" . }}.{{ .Release.Namespace }}.svc
  dnsNames:
    - {{ include "provider.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "provider.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.tls.issuerName }}
    kind: Issuer
  usages:
    - digital signature
    - key encipherment
    - server auth
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "node-drainer.fullname" . }}
  labels:
    {{- include "node-drainer.labels" . | nindent 4}}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "node-drainer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "node-drainer.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "node-drainer.fullname" . }}
      {{- if .Values.global.auditLogging.enabled }}
      securityContext:
        fsGroup: 65532
      {{- end }}
      {{- if or .Values.global.auditLogging.enabled (and .Values.clientCertMountPath .Values.global.datastore (eq .Values.global.datastore.provider "postgresql")) }}
      initContainers:
        {{- if .Values.global.auditLogging.enabled }}
        {{- include "nvsentinel.auditLogging.initContainer" . | nindent 8 }}
        {{- end }}
      {{- if and .Values.clientCertMountPath .Values.global.datastore (eq .Values.global.datastore.provider "postgresql") }}
        - name: fix-cert-permissions
          image: "{{ .Values.global.initContainerImage.repository }}:{{ .Values.global.initContainerImage.tag }}"
          imagePullPolicy: {{ .Values.global.initContainerImage.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          command:
            - sh
            - -c
            - |
              echo "Copying PostgreSQL client certificates with correct permissions..."
              cp /etc/ssl/client-certs-original/tls.crt /etc/ssl/client-certs-fixed/
              cp /etc/ssl/client-certs-original/ca.crt /etc/ssl/client-certs-fixed/
              cp /etc/ssl/client-certs-original/tls.key /etc/ssl/client-certs-fixed/
              chmod 644 /etc/ssl/client-certs-fixed/tls.crt
              chmod 644 /etc/ssl/client-certs-fixed/ca.crt
              chmod 600 /etc/ssl/client-certs-fixed/tls.key
              echo "Certificate permissions fixed:"
              ls -la /etc/ssl/client-certs-fixed/
          volumeMounts:
            - name: postgresql-client-cert-original
              mountPath: /etc/ssl/client-certs-original
              readOnly: true
            - name: client-certs-fixed
              mountPath: /etc/ssl/client-certs-fixed
      {{- end }}
      {{- end }}
      containers:
        - name: node-drainer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default ((.Values.global).image).tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if and .Values.global.datastore (eq .Values.global.datastore.provider "postgresql") }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
          - name: metrics
            containerPort: {{ .Values.global.metricsPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          args:
          - "--metrics-port={{ .Values.global.metricsPort }}"
          - "--config-path=/etc/config/config.toml"
          - "--dry-run={{ .Values.global.dryRun }}"
          {{- if .Values.clientCertMountPath }}
          - "--database-client-cert-mount-path={{ .Values.clientCertMountPath }}"
          {{- else }}
          - "--tls-enabled=false"
          {{- end }}
          volumeMounts:
          - name: config-volume
            mountPath: /etc/config/config.toml
            subPath: config.toml
          {{- if .Values.clientCertMountPath }}
          {{- if and .Values.global.datastore (eq .Values.global.datastore.provider "postgresql") }}
          - name: client-certs-fixed
            mountPath: {{ .Values.clientCertMountPath }}
            readOnly: true
          {{- else }}
          - name: mongo-app-client-cert
            mountPath: {{ .Values.clientCertMountPath }}
            readOnly: true
          {{- end }}
          {{- end }}
          {{- if .Values.customDrain.enabled }}
          - name: drain-template
            mountPath: {{ .Values.customDrain.templateMountPath }}
            readOnly: true
          {{- end }}
          {{- if .Values.global.auditLogging.enabled }}
          {{- include "nvsentinel.auditLogging.volumeMount" . | nindent 10 }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              value: "{{ .Values.logLevel }}"
            # App name for connection identification in logs and currentOp
            - name: APP_NAME
              value: {{ .Chart.Name | quote }}
            {{- if .Values.global.auditLogging.enabled }}
            {{- include "nvsentinel.auditLogging.envVars" . | nindent 12 }}
            {{- end }}
            {{- if .Values.clientCertMountPath }}
            {{- if and .Values.global.datastore (eq .Values.global.datastore.provider "postgresql") }}
            - name: POSTGRESQL_CLIENT_CERT_MOUNT_PATH
              value: {{ .Values.clientCertMountPath }}
            {{- else }}
            - name: MONGODB_CLIENT_CERT_MOUNT_PATH
              value: {{ .Values.clientCertMountPath }}
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ if .Values.global.datastore }}{{ .Release.Name }}-datastore-config{{ else }}mongodb-config{{ end }}
                optional: true
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "node-drainer.fullname" . }}
          items:
          - key: config.toml
            path: config.toml
      {{- if .Values.clientCertMountPath }}
      {{- if and .Values.global.datastore (eq .Values.global.datastore.provider "postgresql") }}
      - name: postgresql-client-cert-original
        secret:
          secretName: postgresql-client-cert
          optional: false
      - name: client-certs-fixed
        emptyDir: {}
      {{- else }}
      - name: mongo-app-client-cert
        secret:
          secretName: {{ include "nvsentinel.certificates.secretName" . }}
          {{- include "nvsentinel.certificates.volumeItems" . | nindent 10 }}
          optional: true
      {{- end }}
      {{- end }}
      {{- if .Values.customDrain.enabled }}
      - name: drain-template
        configMap:
          name: {{ .Values.customDrain.templateConfigMapName | default "drain-template" }}
      {{- end }}
      {{- if .Values.global.auditLogging.enabled }}
      {{- include "nvsentinel.auditLogging.volume" . | nindent 6 }}
      {{- end }}
      restartPolicy: Always
      {{- with (.Values.global.systemNodeSelector | default .Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.global.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.global.systemNodeTolerations | default .Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

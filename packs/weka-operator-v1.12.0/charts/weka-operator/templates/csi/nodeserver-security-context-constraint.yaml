{{- if .Values.csi.installationEnabled }}
{{- if .Capabilities.APIVersions.Has "security.openshift.io/v1/SecurityContextConstraints" }}
kind: SecurityContextConstraints
apiVersion: security.openshift.io/v1
metadata:
  name: csi-wekafs-node-scc

allowPrivilegedContainer: true
allowHostDirVolumePlugin: true
allowHostNetwork: true
allowedVolumeTypes:
  - hostPath
  - secret
readOnlyRootFilesystem: false
allowHostPorts: true
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:{{ .Release.Namespace }}:csi-wekafs-node-sa
{{- end }}
{{- end }}

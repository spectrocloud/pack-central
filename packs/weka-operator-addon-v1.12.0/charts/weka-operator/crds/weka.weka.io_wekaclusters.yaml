---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: wekaclusters.weka.weka.io
spec:
  group: weka.weka.io
  names:
    kind: WekaCluster
    listKind: WekaClusterList
    plural: wekaclusters
    singular: wekacluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Status of the cluster
      jsonPath: .status.status
      name: Status
      type: string
    - description: Weka cluster GUID
      jsonPath: .status.clusterID
      name: Cluster ID
      type: string
    - description: 'Number of compute containers: Active/Created/Desired'
      jsonPath: .status.printer.computeContainers
      name: CCT(A/C/D)
      type: string
    - description: 'Number of drive containers: Active/Created/Desired'
      jsonPath: .status.printer.driveContainers
      name: DCT(A/C/D)
      type: string
    - description: 'Number of Drives: Active/Created/Desired'
      jsonPath: .status.printer.drives
      name: DRVS(A/C/D)
      type: string
    - description: IOPS Read/Write/Metadata
      jsonPath: .status.printer.iops
      name: IOPS(R/W/M)
      priority: 1
      type: string
    - description: Throughput Read/Write
      jsonPath: .status.printer.throughput
      name: THRPT(R/W)
      priority: 1
      type: string
    - description: Filesystem Capacity
      jsonPath: .status.printer.filesystemCapacity
      name: FS(Capacity)
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WekaClusterSpec defines the desired state of WekaCluster
            properties:
              additionalMemory:
                description: additional memory to allocate for weka containers
                properties:
                  compute:
                    type: integer
                  dataServices:
                    type: integer
                  dataServicesFe:
                    type: integer
                  drive:
                    type: integer
                  envoy:
                    type: integer
                  nfs:
                    type: integer
                  s3:
                    type: integer
                  smbw:
                    type: integer
                type: object
              bucketRaftSize:
                description: size of raft for buckets, defaults to 5, 5/9 are supported
                type: integer
              catalog:
                description: Catalog configuration for data catalog service
                properties:
                  indexInterval:
                    default: 1d
                    description: IndexInterval specifies how often the catalog index
                      is updated (e.g., "1d", "1m")
                    type: string
                  retentionPeriod:
                    default: 30d
                    description: RetentionPeriod specifies how long catalog data is
                      retained (e.g., "30d", "10m")
                    type: string
                type: object
              cpuPolicy:
                default: auto
                description: |-
                  cpu policy to use for scheduling cores for weka, unless instructed by weka team, keep default of auto
                  manual and shared are same, with shared being deprecated
                  when manual is used - no exclusive cores will be allocaated on k8s/cgroup level, assuming good alignment of cores usage across different applications, like weka and slurm
                  there is no need to specify siblings in this list, but on the side of other applications like slurm, both weka core and its siblings should be excluded from used cpu set
                enum:
                - auto
                - shared
                - dedicated
                - dedicated_ht
                - manual
                type: string
              csiConfig:
                properties:
                  advanced:
                    properties:
                      controllerLabels:
                        additionalProperties:
                          type: string
                        type: object
                      controllerTolerations:
                        items:
                          description: |-
                            The pod this Toleration is attached to tolerates any taint that matches
                            the triple <key,value,effect> using the matching operator <operator>.
                          properties:
                            effect:
                              description: |-
                                Effect indicates the taint effect to match. Empty means match all taint effects.
                                When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                              type: string
                            key:
                              description: |-
                                Key is the taint key that the toleration applies to. Empty means match all taint keys.
                                If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                              type: string
                            operator:
                              description: |-
                                Operator represents a key's relationship to the value.
                                Valid operators are Exists and Equal. Defaults to Equal.
                                Exists is equivalent to wildcard for value, so that a pod can
                                tolerate all taints of a particular category.
                              type: string
                            tolerationSeconds:
                              description: |-
                                TolerationSeconds represents the period of time the toleration (which must be
                                of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                                it is not set, which means tolerate the taint forever (do not evict). Zero and
                                negative values will be treated as 0 (evict immediately) by the system.
                              format: int64
                              type: integer
                            value:
                              description: |-
                                Value is the taint value the toleration matches to.
                                If the operator is Exists, the value should be empty, otherwise just a regular string.
                              type: string
                          type: object
                        type: array
                      enforceTrustedHttps:
                        type: boolean
                      nodeLabels:
                        additionalProperties:
                          type: string
                        type: object
                      nodeTolerations:
                        items:
                          description: |-
                            The pod this Toleration is attached to tolerates any taint that matches
                            the triple <key,value,effect> using the matching operator <operator>.
                          properties:
                            effect:
                              description: |-
                                Effect indicates the taint effect to match. Empty means match all taint effects.
                                When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                              type: string
                            key:
                              description: |-
                                Key is the taint key that the toleration applies to. Empty means match all taint keys.
                                If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                              type: string
                            operator:
                              description: |-
                                Operator represents a key's relationship to the value.
                                Valid operators are Exists and Equal. Defaults to Equal.
                                Exists is equivalent to wildcard for value, so that a pod can
                                tolerate all taints of a particular category.
                              type: string
                            tolerationSeconds:
                              description: |-
                                TolerationSeconds represents the period of time the toleration (which must be
                                of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                                it is not set, which means tolerate the taint forever (do not evict). Zero and
                                negative values will be treated as 0 (evict immediately) by the system.
                              format: int64
                              type: integer
                            value:
                              description: |-
                                Value is the taint value the toleration matches to.
                                If the operator is Exists, the value should be empty, otherwise just a regular string.
                              type: string
                          type: object
                        type: array
                      skipGarbageCollection:
                        type: boolean
                    type: object
                  csiGroup:
                    type: string
                  endpointsSubnets:
                    items:
                      type: string
                    type: array
                type: object
              driversDistService:
                description: endpoint for distribution service, global https://drivers.weka.io
                  or in-k8s-cluster "https://weka-drivers-dist.namespace.svc.cluster.local:60001"
                type: string
              dynamicTemplate:
                description: weka cluster topology configuration
                properties:
                  computeContainers:
                    minimum: 0
                    type: integer
                  computeCores:
                    minimum: 0
                    type: integer
                  computeExtraCores:
                    minimum: 0
                    type: integer
                  computeHugepages:
                    minimum: 0
                    type: integer
                  computeHugepagesOffset:
                    minimum: 0
                    type: integer
                  containerCapacity:
                    description: |-
                      ContainerCapacity specifies the total capacity (in GiB) requested by each container when using shared drives via SSD proxy.
                      This value takes precedence over DriveCapacity when both are set. It allows more flexible capacity allocation.
                    minimum: 0
                    type: integer
                  dataServicesContainers:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of data services containers'
                    minimum: 0
                    type: integer
                  dataServicesCores:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of data services cores per container'
                    minimum: 0
                    type: integer
                  dataServicesExtraCores:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of data services extra cores per container'
                    minimum: 0
                    type: integer
                  dataServicesFeCores:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of data services frontend cores per container'
                    type: integer
                  dataServicesFeHugepages:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: hugepage allocation for data services frontend container'
                    type: integer
                  dataServicesFeHugepagesOffset:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: hugepage offset for data services frontend container'
                    type: integer
                  dataServicesHugepages:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: hugepage allocation for data services frontend'
                    minimum: 0
                    type: integer
                  dataServicesHugepagesOffset:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: hugepage offset for data services frontend'
                    minimum: 0
                    type: integer
                  driveCapacity:
                    description: |-
                      DriveCapacity is the capacity in GiB to allocate per single virtual drive.
                      NumDrives multiplied by DriveCapacity gives the total capacity requested by each drive container.
                      This value determines how much capacity each container receives from shared drives.
                    minimum: 0
                    type: integer
                  driveContainers:
                    minimum: 0
                    type: integer
                  driveCores:
                    minimum: 0
                    type: integer
                  driveExtraCores:
                    minimum: 0
                    type: integer
                  driveHugepages:
                    minimum: 0
                    type: integer
                  driveHugepagesOffset:
                    minimum: 0
                    type: integer
                  driveTypesRatio:
                    description: DriveTypesRatio specifies the desired ratio of drive
                      types (TLC vs QLC) when allocating drives for the cluster.
                    properties:
                      qlc:
                        default: 0
                        minimum: 0
                        type: integer
                      tlc:
                        default: 0
                        minimum: 0
                        type: integer
                    required:
                    - qlc
                    - tlc
                    type: object
                  envoyCores:
                    minimum: 0
                    type: integer
                  nfsContainers:
                    minimum: 0
                    type: integer
                  nfsCores:
                    minimum: 0
                    type: integer
                  nfsExtraCores:
                    minimum: 0
                    type: integer
                  nfsFrontendHugepages:
                    minimum: 0
                    type: integer
                  nfsFrontendHugepagesOffset:
                    minimum: 0
                    type: integer
                  numDrives:
                    minimum: 0
                    type: integer
                  s3Containers:
                    minimum: 0
                    type: integer
                  s3Cores:
                    minimum: 0
                    type: integer
                  s3ExtraCores:
                    minimum: 0
                    type: integer
                  s3FrontendHugepages:
                    minimum: 0
                    type: integer
                  s3FrontendHugepagesOffset:
                    minimum: 0
                    type: integer
                  smbwContainers:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of SMB-W containers (3-8)'
                    minimum: 0
                    type: integer
                  smbwCores:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of SMB-W cores per container'
                    minimum: 0
                    type: integer
                  smbwExtraCores:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: number of SMB-W extra cores per container'
                    minimum: 0
                    type: integer
                  smbwFrontendHugepages:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: hugepage allocation for SMB-W frontend'
                    minimum: 0
                    type: integer
                  smbwFrontendHugepagesOffset:
                    description: 'EXPERIMENTAL, ALPHA STATE, should not be used in
                      production: hugepage offset for SMB-W frontend'
                    minimum: 0
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: driveCapacity and driveTypesRatio are mutually exclusive;
                    use driveCapacity for TLC-only mode, or containerCapacity with
                    driveTypesRatio for mixed drive types
                  rule: '!has(self.driveCapacity) || self.driveCapacity == 0 || !has(self.driveTypesRatio)'
                - message: numDrives must be >= driveCores when using driveCapacity
                    (TLC-only mode); each drive core requires at least one virtual
                    drive
                  rule: '!has(self.driveCapacity) || self.driveCapacity == 0 || !has(self.numDrives)
                    || self.numDrives == 0 || self.numDrives >= self.driveCores'
                - message: numDrives and containerCapacity are mutually exclusive;
                    use numDrives with driveCapacity for TLC-only mode, or containerCapacity
                    with driveTypesRatio for mixed drive types
                  rule: '!has(self.numDrives) || self.numDrives == 0 || !has(self.containerCapacity)
                    || self.containerCapacity == 0'
                - message: containerCapacity must be greater than 0 when specified
                  rule: '!has(self.containerCapacity) || self.containerCapacity >
                    0'
                - message: at least one of driveTypesRatio.tlc or driveTypesRatio.qlc
                    must be greater than 0
                  rule: '!has(self.driveTypesRatio) || self.driveTypesRatio.tlc >
                    0 || self.driveTypesRatio.qlc > 0'
                - message: driveTypesRatio.tlc must be greater than 0 when driveTypesRatio
                    is specified; TLC-only and mixed TLC/QLC configurations are supported,
                    but QLC-only is not allowed
                  rule: '!has(self.driveTypesRatio) || self.driveTypesRatio.tlc >
                    0'
                - message: driveCapacity must be greater than 0 when specified
                  rule: '!has(self.driveCapacity) || self.driveCapacity > 0'
              encryption:
                properties:
                  internal:
                    description: InternalConfig defines internal encryption settings,
                      encryption key stored in weka configuration, for production
                      systems use real KMS, however this mode can be useful to evaluate
                      performance of encrypted filesystems
                    properties:
                      enabled:
                        type: boolean
                    required:
                    - enabled
                    type: object
                  vault:
                    properties:
                      address:
                        description: Vault address, e.g. "https://vault.example.com:8200".
                        type: string
                      authPath:
                        default: kubernetes
                        description: Path under auth/ that the weka uses for login.
                          defaults to "kubernetes"
                        type: string
                      keyName:
                        default: weka-key
                        description: Name of the transit key. defaults to "weka-key"
                        type: string
                      method:
                        default: kubernetes
                        description: Vault Auth method (only “kubernetes” is supported  on
                          operator side.)
                        enum:
                        - kubernetes
                        type: string
                      role:
                        description: Role to authenticate as in Vault.
                        type: string
                      transitPath:
                        default: transit
                        description: Transit engine mount path, defaults "transit".
                        type: string
                    required:
                    - address
                    - role
                    type: object
                type: object
              expandEndpoints:
                description: endpoint of existing weka cluster, containers created
                  for this k8s-driver cluster will join existing weka cluster, used
                  in flow of migration
                items:
                  type: string
                type: array
              failureDomain:
                description: failure domain configuration for weka containers
                properties:
                  compositeLabels:
                    description: |-
                      If multiple labels are specified, the failure domain will be the combination of the labels.
                      If `compositeLabels` is set, `label` and `skew` will be ignored.
                      When using compositeLabels, weka containers will be spread considering all labels
                      with best effort, but even distribution is not guaranteed
                    items:
                      type: string
                    type: array
                  label:
                    description: |-
                      label used for spreading the weka containers across different failure domains (if set)
                      nodes that have the same value for the label will be considered as a single failure domain
                    type: string
                  skew:
                    description: |-
                      skew for the failure domain, if set, the weka containers will be spread with the skew in mind
                      (only applicable if `label` is set)
                    type: integer
                type: object
              globalPVC:
                properties:
                  name:
                    type: string
                  path:
                    type: string
                required:
                - name
                type: object
              gracefulDestroyDuration:
                default: 24h
                description: |-
                  During this period the cluster will not be destroyed (protection from accidental deletion)
                  Note: due to discrepancies in validation vs parsing, we use a Pattern instead of `Format=duration`. See
                  https://bugzilla.redhat.com/show_bug.cgi?id=2050332
                  https://github.com/kubernetes/apimachinery/issues/131
                  https://github.com/kubernetes/apiextensions-apiserver/issues/56
                pattern: ^(0|([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+)$
                type: string
              hotSpare:
                default: 0
                description: |-
                  A hot spare is reserved capacity designed to handle data rebuilds while maintaining the system's net capacity, even in the event of failure domains being lost
                  See: https://docs.weka.io/weka-system-overview/ssd-capacity-management#hot-spare
                type: integer
              image:
                description: full container image name in format of quay.io/weka.io/weka-in-container:VERSION
                pattern: ^.+:\d+\.\d+\.\d+.*$
                type: string
              imagePullSecret:
                description: image pull secret to use for pulling the image
                type: string
              ipv6:
                description: use ipv6 for weka cluster networking configuration
                type: boolean
              leadershipRaftSize:
                description: size of raft for leadership, defaults to 5, 5/9 are supported
                type: integer
              network:
                description: weka cluster network configuration
                properties:
                  allocateVfPerIoNode:
                    type: boolean
                  bindManagementAll:
                    description: |-
                      BindManagementAll controls whether Weka containers bind to all network interfaces or only to specific management interfaces.
                      When set to false (default), containers will only listen on the management ips interfaces (restrict_listen mode).
                      When set to true, containers will listen on all ips (0.0.0.0) instead of specific IP addresses.
                    type: boolean
                  deviceSubnets:
                    description: |-
                      A list of backend subnets in CIDR notation (for example, 192.168.10.0/24).
                      The operator assigns IP addresses from these subnets to the backend containers for their data path network
                    items:
                      pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                      type: string
                    type: array
                  ethDevice:
                    description: |-
                      The name of a single network interface (for example, eth1) to be used by every backend container.
                      This is for clusters that use only one dedicated NIC for the data path.
                      You cannot use this field with ethDevices.
                      If you leave this empty, the system automatically uses the node’s interface associated with the first subnet defined in deviceSubnets.
                    type: string
                  ethDevices:
                    description: |-
                      A list of network interface names to be used by backend containers when you have multiple dedicated NICs.
                      The order of interfaces in this list is important, as it maps directly to the ethSlots index (the first interface maps to slot-0, the second to slot-1, and so on).
                      You cannot use this field with ethDevice. Ensure that every interface listed here exists on all nodes that are part of the cluster.
                    items:
                      type: string
                    type: array
                  gateway:
                    description: |-
                      The default gateway IPv4 address for the backend containers’ data-path network.
                      This is only necessary if backend subnets need to communicate with destinations outside of their local network (L2 segment).
                      If you have a flat, non-routed backend network, you can leave this field empty.
                    type: string
                  managementIpsSelectors:
                    items:
                      properties:
                        deviceNames:
                          items:
                            type: string
                          type: array
                        disableRdma:
                          type: boolean
                        max:
                          type: integer
                        min:
                          type: integer
                        rdmaOnly:
                          type: boolean
                        subnet:
                          type: string
                      type: object
                    type: array
                  nvidiaVfSingleIp:
                    description: |-
                      NvidiaVfSingleIp indicates whether NVIDIA virtual functions (VFs) should be configured to use a single-ip weka mode, where multiple weka processes can share same VF
                      When not set defaults to false, in future releases, when auto-discovery of capabilities will be implemented not set might translate to true on supported setups
                    type: boolean
                  selectors:
                    items:
                      properties:
                        deviceNames:
                          items:
                            type: string
                          type: array
                        disableRdma:
                          type: boolean
                        max:
                          type: integer
                        min:
                          type: integer
                        rdmaOnly:
                          type: boolean
                        subnet:
                          type: string
                      type: object
                    type: array
                  udpMode:
                    description: |-
                      A setting that enables or disables UDP encapsulation for backend traffic.
                      - false (default): Uses standard raw Ethernet frames. true: Wraps data-path traffic in UDP packets.
                      This is required if your network infrastructure or CNI (Container Network Interface) blocks traffic that isn’t IP-based.
                    type: boolean
                type: object
              nfs:
                properties:
                  interfaces:
                    items:
                      type: string
                    type: array
                  ipRanges:
                    items:
                      type: string
                    type: array
                type: object
                x-kubernetes-validations:
                - message: NFS allows only 1 interface per host
                  rule: '!has(self.interfaces) || self.interfaces.size() <= 1'
              nodeSelector:
                additionalProperties:
                  type: string
                description: node selector for the weka containers
                type: object
              operatorSecretRef:
                description: reference to the secret containing the weka system credentials
                  used by operator, used in flow of migration
                type: string
              overrides:
                properties:
                  allowS3ClusterDestroy:
                    type: boolean
                  allowSmbwClusterDestroy:
                    type: boolean
                  cancelDeletion:
                    description: Cancel deletion of the cluster if it is in graceful
                      destroy period, a disaster recovery mechanism
                    type: boolean
                  disregardRedundancy:
                    description: disregard redundancy constraints, useful for testing,
                      should not be used in production as misaligns failure domains
                    type: boolean
                  dpdkBaseMemoryMb:
                    description: |-
                      DpdkBaseMemoryMbOverride specifies DPDK base memory overrides (in MiB) per container mode.
                      Used for hugepages calculation and resources.json configuration. Default value is 64 MiB per core.
                      Only positive values are applied; zero or unset means use default.
                    properties:
                      compute:
                        type: integer
                      dataServices:
                        type: integer
                      drive:
                        type: integer
                      nfs:
                        type: integer
                      s3:
                        type: integer
                      smbw:
                        type: integer
                    type: object
                  driversBuildId:
                    description: can be used to specify a build_id for a driver in
                      the distributor service, keep empty for auto detection default
                    type: string
                  driversLoaderImage:
                    description: image to be used for loading drivers, do not use
                      unless explicitly instructed by Weka team
                    type: string
                  forceAio:
                    description: force weka to use drives in aio mode and not direct
                      nvme (impacts performance, but might serve as a fallback in
                      case of incompatible device)
                    type: boolean
                  paused:
                    description: |-
                      Pause the cluster - all containers will be stopped forcefully.
                      nil (not set): no propagation, allows direct container-level state manipulation.
                      true: pause all containers.
                      false: actively unpause containers that are in paused state.
                    type: boolean
                  podTerminationDeactivationTimeout:
                    description: |-
                      Timeout duration for deactivating pods that are terminating longer than this duration.
                      When nil (default), the default timeout of 5 minutes is used.
                      When set to 0, deactivation of terminating pods is disabled.
                      Otherwise, the specified duration is used.
                    pattern: ^(0|([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+)$
                    type: string
                  postFormClusterScript:
                    description: script to run post cluster create (i.e before starting
                      io)
                    type: string
                  upgradeAllAtOnce:
                    description: unsafe operation, should not be used unless instructed
                      explicitly by weka personnel
                    type: boolean
                  upgradeForceReplace:
                    description: unsafe operation, skips graceful stop of weka container
                      for a quick replacement to a new image, should not be used unless
                      instructed explicitly by weka personnel
                    type: boolean
                  upgradeForceReplaceDrives:
                    description: unsafe operation, skips graceful stop of drive weka
                      container for a quick replacement to a new image, should not
                      be used unless instructed explicitly by weka personnel
                    type: boolean
                  upgradePausePreCompute:
                    description: Prevent from moving into compute phase
                    type: boolean
                  upgradePaused:
                    description: Pause upgrade
                    type: boolean
                type: object
              podConfig:
                description: advanced pod affinities configuration
                properties:
                  affinity:
                    description: advanced scheduling constraints
                    x-kubernetes-preserve-unknown-fields: true
                  roleAffinity:
                    description: |-
                      affinity per container role
                      takes precedence over the `affinity` field
                    properties:
                      compute:
                        x-kubernetes-preserve-unknown-fields: true
                      drive:
                        x-kubernetes-preserve-unknown-fields: true
                      nfs:
                        x-kubernetes-preserve-unknown-fields: true
                      s3:
                        x-kubernetes-preserve-unknown-fields: true
                      smbw:
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                  roleTopologySpreadConstraints:
                    description: takes precedence over the `topologySpreadConstraints`
                    properties:
                      compute:
                        x-kubernetes-preserve-unknown-fields: true
                      drive:
                        x-kubernetes-preserve-unknown-fields: true
                      nfs:
                        x-kubernetes-preserve-unknown-fields: true
                      s3:
                        x-kubernetes-preserve-unknown-fields: true
                      smbw:
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                  topologySpreadConstraints:
                    description: controls the distribution of weka containers across
                      the failure domains
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              ports:
                description: port allocation for weka containers, if not set, free
                  range will be auto selected. Currently allocated ports can be seen
                  in wekacluster.status.ports
                properties:
                  basePort:
                    description: |-
                      We should not be updating Spec, as it's a user interface and we should not break ability to update spec file
                      Therefore, when BasePort is 0, and Range as 0, we have application level defaults that will be written in here
                    type: integer
                  dataServicesPort:
                    type: integer
                  lbAdminPort:
                    type: integer
                  lbPort:
                    type: integer
                  managementProxyPort:
                    type: integer
                  portRange:
                    type: integer
                  s3Port:
                    type: integer
                type: object
              rawTolerations:
                description: tolerations in standard k8s format
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists and Equal. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
              redundancyLevel:
                description: storage capacity dedicated to system protection (2/4).
                  https://docs.weka.io/weka-system-overview/ssd-capacity-management#protection-level
                type: integer
              roleAnnotations:
                description: annotations for the weka containers per role
                properties:
                  compute:
                    additionalProperties:
                      type: string
                    description: annotations for compute weka containers
                    type: object
                  dataServices:
                    additionalProperties:
                      type: string
                    description: annotations for data services weka containers
                    type: object
                  drive:
                    additionalProperties:
                      type: string
                    description: annotations for drive weka containers
                    type: object
                  nfs:
                    additionalProperties:
                      type: string
                    description: annotations for nfs weka containers
                    type: object
                  s3:
                    additionalProperties:
                      type: string
                    description: annotations for s3 weka containers
                    type: object
                  smbw:
                    additionalProperties:
                      type: string
                    description: annotations for smbw weka containers
                    type: object
                type: object
              roleCoreIds:
                description: |-
                  RoleCoreIds defines a list of CPU core IDs (as seen by the host) that should
                  be assigned to containers of the specific role when CpuPolicy is set to
                  "manual". If the slice for the given role is empty, core ids will not be
                  set for that role, and the manual policy will fail validation on pod start.

                  NOTE: The semantics are the same as for NodeSelector/Annotations structures –
                  a single list per role which will be copied to every container of that role.
                  Users are responsible to provide a set that makes sense for their topology.
                  Example:
                    roleCoreIds:
                      compute: [0,1,2,3]
                      drive:   [4,5,6,7]

                  will result in every compute container getting coreIds [0,1,2,3] and every
                  drive container getting [4,5,6,7].
                properties:
                  compute:
                    items:
                      type: integer
                    type: array
                  dataServices:
                    items:
                      type: integer
                    type: array
                  drive:
                    items:
                      type: integer
                    type: array
                  nfs:
                    items:
                      type: integer
                    type: array
                  s3:
                    items:
                      type: integer
                    type: array
                  smbw:
                    items:
                      type: integer
                    type: array
                type: object
              roleNetworkSelector:
                description: network selector for the weka containers per role, overrides
                  global network
                properties:
                  compute:
                    description: network selector for compute weka containers
                    properties:
                      allocateVfPerIoNode:
                        type: boolean
                      bindManagementAll:
                        description: |-
                          BindManagementAll controls whether Weka containers bind to all network interfaces or only to specific management interfaces.
                          When set to false (default), containers will only listen on the management ips interfaces (restrict_listen mode).
                          When set to true, containers will listen on all ips (0.0.0.0) instead of specific IP addresses.
                        type: boolean
                      deviceSubnets:
                        description: |-
                          A list of backend subnets in CIDR notation (for example, 192.168.10.0/24).
                          The operator assigns IP addresses from these subnets to the backend containers for their data path network
                        items:
                          pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$
                          type: string
                        type: array
                      ethDevice:
                        description: |-
                          The name of a single network interface (for example, eth1) to be used by every backend container.
                          This is for clusters that use only one dedicated NIC for the data path.
                          You cannot use this field with ethDevices.
                          If you leave this empty, the system automatically uses the node’s interface associated with the first subnet defined in deviceSubnets.
                        type: string
                      ethDevices:
                        description: |-
                          A list of network interface names to be used by backend containers when you have multiple dedicated NICs.
                          The order of interfaces in this list is important, as it maps directly to the ethSlots index (the first interface maps to slot-0, the second to slot-1, and so on).
                          You cannot use this field with ethDevice. Ensure that every interface listed here exists on all nodes that are part of the cluster.
                        items:
                          type: string
                        type: array
                      gateway:
                        description: |-
                          The default gateway IPv4 address for the backend containers’ data-path network.
                          This is only necessary if backend subnets need to communicate with destinations outside of their local network (L2 segment).
                          If you have a flat, non-routed backend network, you can leave this field empty.
                        type: string
                      managementIpsSelectors:
                        items:
                          properties:
                            deviceNames:
                              items:
                                type: string
                              type: array
                            disableRdma:
                              type: boolean
                            max:
                              type: integer
                            min:
                              type: integer
                            rdmaOnly:
                              type: boolean
                            subnet:
                              type: string
                          type: object
                        type: array
                      nvidiaVfSingleIp:
                        description: |-
                          NvidiaVfSingleIp indicates whether NVIDIA virtual functions (VFs) should be configured to use a single-ip weka mode, where multiple weka processes can share same VF
                          When not set defaults to false, in future releases, when auto-discovery of capabilities will be implemented not set might translate to true on supported setups
                        type: boolean

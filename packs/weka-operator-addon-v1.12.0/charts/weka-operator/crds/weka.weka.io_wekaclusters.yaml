                    enum:
                    - enabled
                    - disabled
                    - desired
                    - required
                    type: string
                  idmapBackend:
                    description: IdmapBackend specifies the identity mapping backend
                      (e.g., "ad", "rfc2307")
                    type: string
                  ipPools:
                    description: IpPools specifies IP pools for SMB-W service assignment
                    items:
                      type: string
                    type: array
                  ipRanges:
                    description: IpRanges specifies floating IP ranges for SMB-W high
                      availability
                    items:
                      type: string
                    type: array
                  joinedDomainMappingFromId:
                    description: JoinedDomainMappingFromId is the start of the UID/GID
                      range for joined domain mapping
                    type: integer
                  joinedDomainMappingToId:
                    description: JoinedDomainMappingToId is the end of the UID/GID
                      range for joined domain mapping
                    type: integer
                  scaleOutMode:
                    description: ScaleOutMode specifies the scale-out mode for SMB-W
                      clustering
                    enum:
                    - none
                    - full
                    - partial
                    type: string
                  smbConfExtra:
                    description: SmbConfExtra contains additional smb.conf configuration
                    type: string
                  symlink:
                    description: |-
                      Creation-time configuration flags
                      Symlink enables symlink support for SMB-W shares
                    type: boolean
                  userName:
                    type: string
                required:
                - domainJoinSecret
                - domainName
                type: object
              startIoConditions:
                description: conditions that must be met before starting IO
                properties:
                  minNumDrives:
                    description: minimum number of drives that should be added to
                      the cluster before starting IO
                    type: integer
                type: object
              stripeWidth:
                description: stripe width is the number of blocks within a common
                  protection set, ranging from 3 to 16 https://docs.weka.io/weka-system-overview/ssd-capacity-management#stripe-width
                type: integer
              telemetry:
                description: Telemetry configuration for exporting audit logs and
                  other telemetry data
                properties:
                  exports:
                    description: List of telemetry exports to configure
                    items:
                      description: TelemetryExport defines a single telemetry export
                        destination
                      properties:
                        name:
                          description: Name is the unique identifier for this export
                          type: string
                        sources:
                          description: Sources specifies which telemetry sources to
                            export (e.g., "audit")
                          items:
                            type: string
                          type: array
                        splunk:
                          description: Splunk configuration for Splunk HEC export
                          properties:
                            allowUnverifiedCertificate:
                              description: |-
                                AllowUnverifiedCertificate allows accessing without verifying the target certificate.
                                Maps to --allow-unverified-certificate in weka CLI.
                              type: boolean
                            authTokenSecretRef:
                              description: |-
                                AuthTokenSecretRef references a secret containing the Splunk HEC authentication token.
                                Format: "secretName.keyName" where secretName is the name of the secret in the same namespace
                                and keyName is the key within the secret's data that contains the token.
                              type: string
                            caCertSecretRef:
                              description: |-
                                CACertSecretRef optionally references a secret containing a user-provided CA certificate PEM file.
                                Format: "secretName.keyName" where secretName is the name of the secret in the same namespace
                                and keyName is the key within the secret's data that contains the certificate.
                                Maps to --ca-cert in weka CLI. Empty string is treated same as nil (de-configures if was configured).
                                Mutually exclusive with VerifyWithClusterCACert.
                              type: string
                            endpoint:
                              description: Endpoint is the Splunk HEC endpoint URL
                                (maps to --target in weka CLI)
                              type: string
                            verifyWithClusterCACert:
                              description: |-
                                VerifyWithClusterCACert uses the Weka cluster's internal CA certificate to verify.
                                Maps to --verify-with-cluster-cacert in weka CLI.
                                Mutually exclusive with CACertSecretRef.
                              type: boolean
                          required:
                          - authTokenSecretRef
                          - endpoint
                          type: object
                      required:
                      - name
                      - sources
                      type: object
                    type: array
                type: object
              template:
                default: dynamic
                description: A template/strategy of how to build a cluster, right
                  now only "dynamic" supported, explicitly specifying config of a
                  cluster
                type: string
              tolerations:
                description: simplified tolerations, checked only by key existence,
                  expanding to NoExecute|NoSchedule tolerations
                items:
